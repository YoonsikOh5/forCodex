<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>카르디아 온라인 듀얼</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="app">
      <section class="hero" id="lobbyView">
        <img class="hero-art" src="/assets/cardia-city.svg" alt="마법 도시 카르디아를 표현한 원형 문장">
        <div class="hero-copy">
          <p class="eyebrow">온라인 2인 대전</p>
          <h1>카르디아 온라인 듀얼</h1>
          <p>동시에 카드를 내고, 높은 영향력은 인장을 얻고, 낮은 카드는 능력을 발동합니다. 먼저 인장 5개를 모으면 승리합니다.</p>
        </div>

        <div class="lobby-grid">
          <section class="panel">
            <h2>방 만들기</h2>
            <label for="createName">내 이름</label>
            <input id="createName" type="text" maxlength="18" placeholder="플레이어 1">
            <button class="primary-button" id="createRoomButton" type="button">새 방 만들기</button>
          </section>

          <section class="panel">
            <h2>방 참가</h2>
            <label for="joinName">내 이름</label>
            <input id="joinName" type="text" maxlength="18" placeholder="플레이어 2">
            <label for="roomCodeInput">방 코드</label>
            <input id="roomCodeInput" type="text" maxlength="4" placeholder="ABCD">
            <button class="secondary-button" id="joinRoomButton" type="button">참가하기</button>
          </section>
        </div>
      </section>

      <section class="game-shell" id="gameView" hidden>
        <header class="topbar">
          <div>
            <p class="eyebrow">방 코드 <span id="roomCodeLabel"></span></p>
            <h1 id="gameTitle">대기실</h1>
          </div>
          <div class="topbar-actions">
            <button class="secondary-button" id="copyLinkButton" type="button">초대 링크 복사</button>
            <button class="ghost-button" id="leaveButton" type="button">나가기</button>
          </div>
        </header>

        <section class="players" id="playersPanel"></section>

        <section class="panel lobby-panel" id="readyPanel">
          <h2>게임 준비</h2>
          <p>두 명이 모두 들어오고 준비하면 덱을 섞어 각자 5장을 받고 시작합니다.</p>
          <div class="button-row">
            <button class="primary-button" id="readyButton" type="button">준비</button>
            <button class="secondary-button" id="forceNewPlayerButton" type="button">이 브라우저로 빈 자리 참가</button>
          </div>
        </section>

        <section class="status-band" id="statusBand" hidden></section>

        <section class="choice-panel" id="pendingPanel" hidden></section>

        <section class="board-wrap" id="boardWrap" hidden>
          <div class="board-head">
            <h2>조우 보드</h2>
            <span id="roundLabel"></span>
          </div>
          <div class="encounters" id="encounters"></div>
        </section>

        <section class="hand-panel" id="handPanel" hidden>
          <div class="board-head">
            <h2>내 손패</h2>
            <span id="handHint"></span>
          </div>
          <div class="hand" id="hand"></div>
        </section>

        <aside class="log-panel" id="logPanel" hidden>
          <h2>게임 기록</h2>
          <ol id="gameLog"></ol>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
